version: '3.8'

services:

  sqlserver-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-db

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    networks:
      - webapi-network



  my-redis:
    image: redis:latest
    container_name: my-redis

    command: redis-server --requirepass "RedisStrong!Pass123"

    ports:
      - "6379:6379"

    networks:
      - webapi-network



  kafka-broker:
    image: apache/kafka:3.7.0
    container_name: kafka-broker

    ports:
      - "9092:9092"

    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: 'broker,controller'

      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker:9093'

      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'

      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'

      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092'

      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    networks:
      - webapi-network



  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092

    depends_on:
      - kafka-broker

    networks:
      - webapi-network



  shop:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: webapi-shop

    ports:
      - "80:80"

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80

      ConnectionStrings__DefaultConnection: "Server=sqlserver-db;Database=WebApiShop_215602996;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"

      Kafka__BootstrapServers: localhost:9092

    depends_on:
      - sqlserver-db
      - my-redis
      - kafka-broker

    networks:
      - webapi-network



networks:
  webapi-network:
    driver: bridge    